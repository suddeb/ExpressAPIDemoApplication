<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express API Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Express API Explorer</h1>
        <p>Select an endpoint, execute requests, and view the JSON response.</p>

        <form id="apiForm">
            <div class="form-group row">
                <div class="col">
                    <label for="method">Method</label>
                    <select id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>
                <div class="col grow">
                    <label for="endpoint">Endpoint</label>
                    <select id="endpoint">
                        <option value="/api/users">/api/users</option>
                        <option value="/api/products">/api/products</option>
                        <option value="/api/health">/api/health</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="params">ID / Query Params (Optional)</label>
                <input type="text" id="params" placeholder="e.g. /1 or ?role=admin">
            </div>

            <div class="form-group" id="bodyGroup" style="display: none;">
                <label for="body">Request Body (JSON)</label>
                <textarea id="body" rows="5" placeholder='{ "name": "John Doe", ... }'></textarea>
            </div>

            <button type="submit" id="sendBtn">Send Request</button>
        </form>

        <div id="responseSection" class="hidden">
            <div class="status-bar">
                Status: <span id="status"></span>
            </div>
            <pre><code id="responseBody"></code></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
